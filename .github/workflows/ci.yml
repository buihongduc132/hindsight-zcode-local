name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Typecheck, Lint, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # NODE_ENV is unset on CI; set it explicitly so devDependencies install.
      # (npm skips devDeps when NODE_ENV=production; this project is a bundled
      # library whose deps are ALL devDeps.)
      - name: Install dependencies
        env:
          NODE_ENV: development
        run: npm install --include=dev --no-fund --no-audit

      - name: Typecheck (tsc --noEmit)
        env:
          NODE_ENV: development
        run: npm run typecheck

      - name: Lint (eslint)
        env:
          NODE_ENV: development
        run: npm run lint

      - name: Build (esbuild bundle)
        env:
          NODE_ENV: development
        run: npm run build

      - name: Test (vitest)
        env:
          NODE_ENV: development
        run: npm run test

      - name: Verify dist bundles are zero-dependency (run from empty dir)
        run: |
          # The honest zero-dependency proof: copy bundles to a directory with NO
          # node_modules and confirm they run on system Node alone. Running from
          # the repo root would pass even if zod were externalized (false green).
          mkdir -p /tmp/zerodep-check
          cp dist/mcp-server.cjs dist/recall.cjs dist/retain.cjs /tmp/zerodep-check/
          cd /tmp/zerodep-check
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize"}' | node mcp-server.cjs | grep -q '"protocolVersion"'
          echo '{}' | node recall.cjs
          echo '{}' | node retain.cjs
          # Confirm NO external requires of non-builtin packages remain.
          for f in *.cjs; do
            bad=$(grep -oE 'require\("[^".]+"\)' "$f" | grep -vE 'require\("(node:|fs|path|os|child_process|crypto|readline|http|https|stream|url|util|events|buffer|querystring)' || true)
            if [ -n "$bad" ]; then echo "ERROR: $f has external require: $bad"; exit 1; fi
          done
          echo "zero-dependency verified: all bundles run without node_modules"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14
